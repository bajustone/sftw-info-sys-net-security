networks:
  wan:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.0.0/24
          gateway: 10.0.0.254
  lan:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "false"
    ipam:
      config:
        - subnet: 192.168.1.0/24
          gateway: 192.168.1.254
  dmz:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "false"
    ipam:
      config:
        - subnet: 192.168.2.0/24
          gateway: 192.168.2.254

services:
  firewall:
    build: ./firewall
    container_name: firewall
    hostname: firewall
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
    networks:
      wan:
        ipv4_address: 10.0.0.2
      lan:
        ipv4_address: 192.168.1.1
      dmz:
        ipv4_address: 192.168.2.1
    restart: unless-stopped

  lan-client:
    build: ./lan-client
    container_name: lan-client
    hostname: lan-client
    cap_add:
      - NET_ADMIN
    networks:
      lan:
        ipv4_address: 192.168.1.100
    depends_on:
      - firewall
    restart: unless-stopped

  dmz-server:
    build: ./dmz-server
    container_name: dmz-server
    hostname: dmz-server
    cap_add:
      - NET_ADMIN
    ports:
      - "80:80"
      - "443:443"
    networks:
      dmz:
        ipv4_address: 192.168.2.100
    depends_on:
      - firewall
    restart: unless-stopped

  attacker:
    build: ./attacker
    container_name: attacker
    hostname: attacker
    cap_add:
      - NET_ADMIN
    networks:
      wan:
        ipv4_address: 10.0.0.100
    depends_on:
      - firewall
    restart: unless-stopped
