# ModSecurity engine state + audit logging (Lab 9, Steps 3–7).
#
# The Debian/Ubuntu libapache2-mod-security2 ships /etc/apache2/mods-available/
# security2.conf which already does:
#   IncludeOptional /etc/modsecurity/*.conf          (loads THIS file)
#   IncludeOptional /usr/share/modsecurity-crs/*.load
# and owasp-crs.load already Includes crs-setup.conf + all /usr/share/modsecurity-crs/rules/*.conf
# plus the two exclusion hooks under /etc/modsecurity/crs/. So the CRS rule set
# is already wired end-to-end — all this file has to do is flip SecRuleEngine
# and point the audit log where toggle-waf.sh + test-webapp.sh expect it.

<IfModule security2_module>
    SecRuleEngine SECRULEENGINE_PLACEHOLDER

    SecRequestBodyAccess On
    SecResponseBodyAccess Off

    SecAuditEngine RelevantOnly
    SecAuditLog /var/log/apache2/modsec_audit.log
    SecAuditLogParts ABIJDEFHZ
    SecAuditLogType Serial
</IfModule>
